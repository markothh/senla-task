version: '3.9'

services:

  db:
    image: postgres:15
    container_name: bookshop_db
    restart: always
    environment:
      POSTGRES_DB: bookshop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: bookshop_app
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  postgres_data: