services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka1:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:19092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka1:19092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

  kafka2:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9093:9092"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:19092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka2:19092,EXTERNAL://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

  kafka3:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9094:9092"
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:19092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka3:19092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

  kafka-init:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      kafka1:
        condition: service_started
      kafka2:
        condition: service_started
      kafka3:
        condition: service_started
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Ожидание готовности брокеров Kafka..."
        for i in $$(seq 1 30); do
          if kafka-topics --bootstrap-server kafka1:19092 --list >/dev/null 2>&1; then
            echo "Kafka готов!"
            break
          fi
          echo "Попытка $$i: Kafka еще не готов, ожидание..."
          sleep 2
        done
        kafka-topics --bootstrap-server kafka1:19092 \
          --create --if-not-exists \
          --topic transfers \
          --partitions 3 \
          --replication-factor 3 \
          --config retention.ms=300000 \
          --config min.insync.replicas=2
        echo "Топик 'transfers' создан"
        kafka-topics --bootstrap-server kafka1:19092 --describe --topic transfers

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: transfers
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d transfers"]
      interval: 2s
      timeout: 3s
      retries: 30

  producer:
    build: ./producer
    depends_on:
      kafka-init:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: on-failure

  consumer1:
    build: ./consumer
    depends_on:
      kafka-init:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: on-failure

  consumer2:
    build: ./consumer
    depends_on:
      kafka-init:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: on-failure

  consumer3:
    build: ./consumer
    depends_on:
      kafka-init:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  pgdata:
